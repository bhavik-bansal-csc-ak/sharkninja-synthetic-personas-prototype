version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "Node $(node --version) / npm $(npm --version)"
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    # Vite outputs the production bundle to dist/
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
